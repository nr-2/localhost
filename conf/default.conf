# localhost - example configuration
#
# Lines starting with # are comments. Each "server" block defines a virtual
# host; a host:port pair may be shared by multiple server blocks, in which
# case "server_name" picks the right one (the first server for a given
# host:port is the default when no name matches).

server {
    listen 127.0.0.1:8080
    server_name localhost

    client_max_body_size 5M

    error_page 400 ./www/errors/400.html
    error_page 403 ./www/errors/403.html
    error_page 404 ./www/errors/404.html
    error_page 405 ./www/errors/405.html
    error_page 413 ./www/errors/413.html
    error_page 500 ./www/errors/500.html

    location / {
        root ./www/html
        index index.html
        methods GET POST DELETE
        autoindex off
    }

    location /uploads {
        root ./www/uploads
        methods GET POST DELETE
        autoindex on
        upload_store ./www/uploads
    }

    location /cgi-bin {
        root ./www/cgi-bin
        methods GET POST
        cgi .py /usr/bin/python3
        cgi .sh /bin/sh
    }

    location /old {
        return 301 /
    }
}

# A second virtual server on a different port, demonstrating that the
# server can listen on multiple ports/hosts at once from a single process.
server {
    listen 127.0.0.1:8081

    location / {
        root ./www/site2
        index index.html
        methods GET
        autoindex on
    }
}
